name: Security Checks

on:
  push:
    branches:
      - "master"
      - "2.0.x"
      - "v*.*.*"
  pull_request:
    branches:
      - "master"
      - "2.0.x"
      - "v*.*.*"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAVEN_OPTS: "-Xmx2g"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run OWASP Dependency-Check
        run: sh ./mvnw -B -Psecurity -Dgpg.skip=true verify
